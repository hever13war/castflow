<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastFlow TV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 18px;
  }
  h1 { color: #00e5ff; font-size: 28px; margin-bottom: 20px; }
  #status {
    padding: 12px;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 16px;
  }
  input {
    width: 100%;
    padding: 14px;
    font-size: 28px;
    letter-spacing: 10px;
    text-align: center;
    background: #111;
    color: #fff;
    border: 2px solid #555;
    border-radius: 8px;
    margin-bottom: 14px;
    box-sizing: border-box;
  }
  input:focus { border-color: #00e5ff; outline: none; }
  button {
    width: 100%;
    padding: 16px;
    font-size: 20px;
    background: #00e5ff;
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 10px;
  }
  button.red {
    background: #333;
    color: #f44;
    border: 1px solid #f44;
    display: none;
  }
  video {
    width: 100%;
    background: #000;
    border-radius: 8px;
    margin-top: 16px;
    display: none;
  }
  #dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    margin-right: 8px;
  }
  #dot.on { background: #0f0; }
  #dot.warn { background: #fa0; }
  #dot.err { background: #f44; }
</style>
</head>
<body>

<h1>📺 CastFlow TV</h1>

<div id="status"><span id="dot"></span><span id="msg">Ingresa el código del celular</span></div>

<input id="code-in" maxlength="6" placeholder="CÓDIGO" oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,6)">

<button id="btn-conn" onclick="conectar()">🔗 Conectar</button>
<button class="red" id="btn-disc" onclick="desconectar()">✖ Desconectar</button>

<video id="vid" autoplay playsinline controls></video>

<script>
var peer = null;
var call = null;

function estado(txt, tipo) {
  document.getElementById('msg').textContent = txt;
  var d = document.getElementById('dot');
  d.className = tipo || '';
}

function conectar() {
  var code = document.getElementById('code-in').value.trim().toUpperCase();
  if (code.length < 4) { estado('Código muy corto', 'err'); return; }

  estado('Conectando...', 'warn');

  if (peer) { peer.destroy(); }
  peer = new Peer({ debug: 0 });

  peer.on('open', function() {
    estado('Llamando al emisor...', 'warn');
    call = peer.call(code, new MediaStream());

    call.on('stream', function(stream) {
      var v = document.getElementById('vid');
      v.srcObject = stream;
      v.style.display = 'block';
      estado('Recibiendo pantalla', 'on');
    });

    call.on('close', function() {
      estado('Emisor desconectado', 'err');
      resetear();
    });

    call.on('error', function(e) {
      estado('Error: ' + e, 'err');
    });
  });

  peer.on('error', function(e) {
    if (e.type === 'peer-unavailable') {
      estado('Código incorrecto o emisor no disponible', 'err');
    } else {
      estado('Error: ' + e.type, 'err');
    }
  });

  document.getElementById('btn-conn').style.display = 'none';
  document.getElementById('btn-disc').style.display = 'block';
}

function resetear() {
  var v = document.getElementById('vid');
  v.srcObject = null;
  v.style.display = 'none';
  document.getElementById('btn-conn').style.display = 'block';
  document.getElementById('btn-disc').style.display = 'none';
}

function desconectar() {
  if (call) { call.close(); call = null; }
  if (peer) { peer.destroy(); peer = null; }
  document.getElementById('code-in').value = '';
  resetear();
  estado('Desconectado', '');
}
</script>
</body>
</html>
